version = 3.11.1
runner.dialect = scala213source3
style = defaultWithAlign
maxColumn = 100
project {
  git = true
}
rewrite {
  scala3 {
    convertToNewSyntax = true
    removeOptionalBraces = true
    insertEndMarkerMinLines = 30
    removeEndMarkerMaxLines = 29
  }
  rules = [Imports]
  imports {
    groups = [
      ["[a-z].*"],
      ["java\\..*", "scala\\..*"]
    ]
    sort = original
    selectors = fold
  }
  trailingCommas.style = never
}
fileOverride {
  "glob:**/project/**" {
    runner.dialect = sbt1
  }
  "glob:**/*.sbt" {
    runner.dialect = sbt1
  }
}
